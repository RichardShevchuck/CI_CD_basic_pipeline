stages:
  - build
  - test

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"


build-job:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building the application..."
    - docker build -t app:latest .


test-job:
  stage: test
  image: python:3.8
  script: 
    - pip install -r requirements.txt
    - pytest