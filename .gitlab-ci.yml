stages:
  - build
  - test

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"


build-job-run:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building the application..."
    - docker build -t app:latest .
    - docker run -d -p 8000:8000 app:latest
    - curl -f http://localhost:8000/ || exit 1


test-job:
  stage: test
  image: python:3.8
  script: 
    - pip install -r requirements.txt
    - pytest


